strategy: basis_arb
instrument: ETH-PERP
tick_interval: 30
data_dir: data/cli/carry/basis_arb

max_position_qty: 2.0
max_notional_usd: 2000.0
max_order_size: 0.5
max_daily_drawdown_pct: 1.0
max_leverage: 2.0
tvl: 5000.0

allocation_plan_path: data/research/live_allocation_plan.json
allocation_enforce: true
allocation_refresh_ticks: 15
portfolio_plan_path: data/research/live_allocation_plan.json
portfolio_enforce: true
portfolio_refresh_ticks: 10
portfolio_state_db_path: data/portfolio/state.db
portfolio_ttl_ticks: 30

strategy_params:
  basis_threshold_bps: 6.0
  size: 0.2
  funding_window: 12
